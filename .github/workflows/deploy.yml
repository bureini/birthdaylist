name: Deploy Web and Build Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # JOB 1: Web deployment to GitHub Pages
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4

  # JOB 2: Packaging code to Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor Core and CLI
        run: npm install

      # Dynamically maps files to 'www' folder to satisfy Capacitor's security rules
      - name: Prepare Separate Web Assets Folder
        run: |
          mkdir -p www
          cp index.html www/
          cp icon.png www/ || echo "No icon asset found, skipping icon clone step."

      # Corrected modern Capacitor V6 syntax command order
      - name: Initialize Android Native Layer
        run: npx cap add android || echo "Android layer already exists."

      # Safely copies index.html from www/ into the native android package layers
      - name: Sync Assets to Native Code
        run: npx cap sync

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile and Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayList-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
