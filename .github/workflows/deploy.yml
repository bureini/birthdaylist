name: Deploy Web and Build Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # JOB 1: Web deployment to GitHub Pages
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      # Because your file is named index.html, GitHub Pages reads it automatically
      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4

  # JOB 2: Packaging code to Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Capacitor CLI
        run: npm install

      # Adds the native android workspace wrapper template directory if it doesn't exist
      - name: Initialize Android Native Layer
        run: npx cap android add || echo "Android folder already configured."

      # Copies your index.html and assets directly into the native android folders
      - name: Sync Assets to Native Code
        run: npx cap sync

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile and Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayList-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
