name: Troubleshoot Production Signing Pipeline

on:
  push:
    branches:
      - troubleshoot-signing

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4
      - name: Upload Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Capacitor CLI
        run: npm install
      - name: Prepare Separate Web Assets Folder
        run: |
          mkdir -p www
          cp index.html www/
          cp icon.png www/ || echo "No icon asset found."
      - name: Initialize Android Native Layer
        run: npx cap add android || echo "Android layer already configured."
      - name: Sync Assets to Native Code
        run: npx cap sync
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build Release APK via Gradle
        run: |
          cd android
          ./gradlew assembleRelease

      # Automatically generates a fresh key inside the runner container instance
      - name: Generate Fresh Keystore on the Fly
        run: |
          mkdir -p android/app
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias "bday_alias" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "Bureini2026" \
            -keypass "Bureini2026" \
            -dname "CN=Bureini, OU=Development, O=BirthdayList, L=Tarawa, C=KI"

      # Signs the application layout directly
      - name: Cryptographically Sign Production APK
        run: |
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign \
            --ks android/app/release.keystore \
            --ks-key-alias "bday_alias" \
            --ks-pass pass:"Bureini2026" \
            --key-pass pass:"Bureini2026" \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Finished Production APK File
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayList-Production-Signed-APK
          path: android/app/build/outputs/apk/release/app-release-signed.apk
