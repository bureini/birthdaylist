name: Deploy Web and Build Production Signed APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # JOB 1: Web deployment to GitHub Pages
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4

  # JOB 2: Packaging code to Android APK and Cryptographically Signing it
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor CLI
        run: npm install

      # Maps index.html to 'www' folder to satisfy Capacitor's security rules
      - name: Prepare Separate Web Assets Folder
        run: |
          mkdir -p www
          cp index.html www/
          cp icon.png www/ || echo "No icon asset found, skipping icon clone step."

      # Adds the native android workspace wrapper template directory if it doesn't exist
      - name: Initialize Android Native Layer
        run: npx cap add android || echo "Android layer already configured."

      # Copies your index.html from www/ into the native android folders
      - name: Sync Assets to Native Code
        run: npx cap sync

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Google Requirement: Build an optimized Release APK instead of an unoptimized Debug APK
      - name: Build Release APK via Gradle
        run: |
          cd android
          ./gradlew assembleRelease

      # Google Requirement: Sign the binary file cryptographically using Repository Secrets
      - name: Sign Android Release APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Finished Production APK File
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayList-Production-Signed-APK
          path: ${{ steps:sign_app.outputs.signedReleaseFile }}