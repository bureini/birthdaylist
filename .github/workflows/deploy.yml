name: Deploy Web and Build Production Signed APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4
      - name: Upload Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor CLI
        run: npm install

      - name: Prepare Separate Web Assets Folder
        run: |
          mkdir -p www
          cp index.html www/
          cp icon.png www/ || echo "No icon asset found."

      - name: Initialize Android Native Layer
        run: npx cap add android || echo "Android layer already exists."

      - name: Sync Assets to Native Code
        run: npx cap sync

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Google Expectation: Build an optimized Release Release APK instead of an unoptimized Debug APK
      - name: Build Release APK via Gradle
        run: |
          cd android
          ./gradlew assembleRelease

      # Google Expectation: Sign the binary file cryptographically
      - name: Sign Android Release APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: "" # Leaving empty defaults to generating a secure pipeline-specific key
          alias: birthdaylist_key
          keyStorePassword: "SuperSecretPassword123"
          keyPassword: "SuperSecretPassword123"

      - name: Upload Finished Production APK File
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayList-Production-Signed-APK
          path: ${{ steps:sign_app.outputs.signedReleaseFile }}
