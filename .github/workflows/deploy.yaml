name: Deploy Web App and Build Production Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "production-pipeline"
  cancel-in-progress: true

jobs:
  # JOB 1: Web deployment directly to live GitHub Pages instance
  deploy-web:
    name: Public Web Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Web Pages Infrastructure
        uses: actions/configure-pages@v4

      - name: Upload Single-Base Production Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live Site Panel
        id: deployment
        uses: actions/deploy-pages@v4

  # JOB 2: Validation check, bundling dependencies, asset mapping, compilation & signing
  build-android:
    name: Production Android Compiling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      # 🔍 CRITICAL ADVISORY PRE-CHECK: Protect repository single-base layout before compiler actions
      - name: Validate Single-Base Integrity
        run: |
          if [ ! -f index.html ]; then
            echo "❌ CRITICAL ERROR: index.html was not found in the root directory context."
            exit 1
          fi
          # Ensure essential photo update triggers exist in source structure
          grep -q "addBirthday" index.html && grep -q "editBirthday" index.html || (echo "❌ ERROR: Core data lifecycle methods are missing from single-base source script code."; exit 1)

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Application Dependencies
        run: npm install

      - name: Sync Static Assets to Native Dist Layout
        run: |
          mkdir -p www
          cp index.html www/
          cp icon.png www/ || echo "⚠️ Warning: No primary icon image file found. Relying on baseline system fallbacks."

      - name: Initialize Android Native Target Framework
        run: npx cap add android || echo "Android bridge framework configuration step skipped."

      - name: Map Single-Base Layer to Android Bridge Assets
        run: npx cap sync

      - name: Setup Java JDK Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile Release Build Configuration via Gradle
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Generate Ephemeral Production Keystore Signer
        run: |
          mkdir -p android/app
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias "bday_alias" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "Bureini2026" \
            -keypass "Bureini2026" \
            -dname "CN=Bureini, OU=Development, O=BirthdayList, L=Tarawa, C=KI"

      - name: Apply Cryptographic Signatures to Production APK Output
        run: |
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign \
            --ks android/app/release.keystore \
            --ks-key-alias "bday_alias" \
            --ks-pass pass:"Bureini2026" \
            --key-pass pass:"Bureini2026" \
            --out android/app/build/outputs/apk/release/BirthdayList-Production-Signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Archive Production Signed Artifact Package
        uses: actions/upload-artifact@v4
        with:
          name: BirthdayList-Production-Signed-APK
          path: android/app/build/outputs/apk/release/BirthdayList-Production-Signed.apk

      - name: Auto-Publish Production Release Asset Page
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: "BirthdayList Stable Package Update ${{ github.ref_name }}"
          body: |
            ### 🚀 Production Single-Base Package Deployment Live!
            - **Web Deployment Status**: Successfully pushed and verified live via static hosting dashboard systems.
            - **Android Native Snapshot Build**: Compiled, signed, and packaged dynamically from the verified single-base `index.html` runtime asset snapshot package.
          files: android/app/build/outputs/apk/release/BirthdayList-Production-Signed.apk
          generate_release_notes: true